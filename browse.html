<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse AI Tools — Which AIPick</title>
  <meta name="description"
    content="Browse the complete directory of AI tools. Filter by category, explore new tools, and find exactly what you need for your projects and workflows.">
  <meta name="robots" content="index,follow">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Browse AI Tools — WhichAIPick">
  <meta property="og:description"
    content="Browse the complete directory of AI tools. Filter by category, explore new tools, and find exactly what you need for your projects and workflows.">
  <meta property="og:image" content="/assets/logo/logo-final.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary">
  <meta property="twitter:title" content="Browse AI Tools — WhichAIPick">
  <meta property="twitter:description"
    content="Browse the complete directory of AI tools. Filter by category, explore new tools, and find exactly what you need for your projects and workflows.">

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico">

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <link rel="stylesheet" href="/css/styles.css?v=fixheader1">
  <link rel="stylesheet" href="/css/pages/browse.css">
</head>

<body data-bg="browse">
  <div id="site-header"></div>

  <main>
    <div class="page-container">
      <div class="page-header">
        <h1>Browse AI Tools</h1>
        <p>Discover tools across every workflow</p>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <div class="filter-search">
          <input type="search" id="search-input" placeholder="Search by name..." aria-label="Search tools">
        </div>

        <div class="filter-controls">
          <div class="filter-item">
            <label for="sort-select">Sort:</label>
            <select id="sort-select" aria-label="Sort tools">
              <option value="recommended">Recommended</option>
              <option value="az">A–Z</option>
              <option value="za">Z–A</option>
            </select>
          </div>

          <div class="filter-item">
            <label for="category-select">Category:</label>
            <select id="category-select" aria-label="Category filter">
              <option value="">All categories</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Tool List Container -->
      <div id="browse-container">
        <div id="browse-stats" class="browse-stats"></div>
        <div id="browse-list" class="browse-list"></div>
        <div id="load-more-container" class="load-more-container"></div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="/js/main.js?v=1.6"></script>
  <script src="/js/descriptions.js?v=1.6"></script>
  <script src="/js/layout.js?v=1.6" defer></script>
  <script>
    let allTools = [];
    let filteredTools = [];
    let displayedCount = 0;
    let recommendedIds = []; // Global state for visual recommendations
    const ITEMS_PER_PAGE = 30;

    // Extract domain from URL
    function getDomain(url) {
      if (!url) return 'N/A';
      try {
        const urlObj = new URL(url.startsWith('http') ? url : 'https://' + url);
        return urlObj.hostname.replace('www.', '');
      } catch {
        return 'N/A';
      }
    }

    // Render tools
    function renderTools(append = false) {
      const container = document.getElementById('browse-list');
      const start = append ? displayedCount : 0;
      const end = Math.min(start + ITEMS_PER_PAGE, filteredTools.length);

      if (!append) {
        container.innerHTML = '';
        displayedCount = 0;
      }

      const fragment = document.createDocumentFragment();

      for (let i = start; i < end; i++) {
        const tool = filteredTools[i];
        const card = document.createElement('div');

        // Visual Polish: Add recommended class
        const isRecommended = recommendedIds.includes(tool.id);
        card.className = isRecommended ? 'tool-card recommended' : 'tool-card';

        const domain = getDomain(tool.website_url);
        const description = getDescriptionForTool(tool.id);

        card.innerHTML = `
          <div class="tool-card-header">
            <h3><a href="/tool.html?id=${encodeURIComponent(tool.id)}">${tool.name}</a></h3>
            <div class="tool-meta">
                <span class="tool-card-category">${tool.category}</span>
                <span class="tool-card-domain">${domain}</span>
            </div>
            ${description ? `<div class="tool-card-desc">${description}</div>` : ''}
          </div>
          <div class="tool-card-actions">
            <a href="/tool.html?id=${encodeURIComponent(tool.id)}" class="btn btn-primary btn-sm">View Tool</a>
            ${tool.website_url ? `<a href="${tool.website_url}" target="_blank" rel="noopener" class="btn-link-secondary">Website →</a>` : ''}
          </div>
        `;

        fragment.appendChild(card);
      }

      container.appendChild(fragment);
      displayedCount = end;

      updateLoadMoreButton();
      updateStats();
    }

    // Update load more button
    function updateLoadMoreButton() {
      const container = document.getElementById('load-more-container');

      if (displayedCount < filteredTools.length) {
        const remaining = filteredTools.length - displayedCount;
        container.innerHTML = `
          <button id="load-more-btn" class="btn btn-secondary">
            Load More (+${Math.min(ITEMS_PER_PAGE, remaining)} tools)
          </button>
        `;
        document.getElementById('load-more-btn').addEventListener('click', () => {
          renderTools(true);
        });
      } else {
        container.innerHTML = '';
      }
    }

    // Update stats
    function updateStats() {
      const stats = document.getElementById('browse-stats');
      stats.textContent = `Showing ${displayedCount} of ${filteredTools.length} tools`;
    }

    // Filter and sort
    function applyFilters() {
      const searchTerm = document.getElementById('search-input').value.toLowerCase();
      const sortOrder = document.getElementById('sort-select').value;
      const selectedCategory = document.getElementById('category-select').value;

      // Filter by search and category
      filteredTools = allTools.filter(tool => {
        const matchesSearch = tool.name.toLowerCase().includes(searchTerm);
        const matchesCategory = !selectedCategory || tool.category === selectedCategory;
        return matchesSearch && matchesCategory;
      });

      // Sort
      if (sortOrder === 'recommended') {
        filteredTools = sortToolsRecommended(filteredTools);
      } else if (sortOrder === 'az') {
        filteredTools.sort((a, b) => a.name.localeCompare(b.name));
      } else if (sortOrder === 'za') {
        filteredTools.sort((a, b) => b.name.localeCompare(a.name));
      }

      renderTools(false);
    }

    // Initialize
    async function init() {
      try {
        await loadTools();
        await loadDescriptions(); // Load descriptions for cards

        // Load recommended list for visual highlighting
        const recData = await loadRecommendedList();
        recommendedIds = recData ? recData.recommended_ids : [];

        allTools = getAllTools();
        filteredTools = [...allTools];

        // Extract unique categories (excluding Uncategorized)
        const categories = new Set();
        allTools.forEach(tool => {
          if (tool.category && tool.category !== 'Uncategorized') {
            categories.add(tool.category);
          }
        });

        // Populate category dropdown
        const categorySelect = document.getElementById('category-select');
        const sortedCategories = Array.from(categories).sort();
        sortedCategories.forEach(category => {
          const option = document.createElement('option');
          option.value = category;
          option.textContent = category;
          categorySelect.appendChild(option);
        });

        // Use main.js sort helper which uses its internal rec data, 
        // but we also have local recommendedIds for visual class
        filteredTools = sortToolsRecommended(filteredTools);

        renderTools(false);

        // Event listeners
        document.getElementById('search-input').addEventListener('input', applyFilters);
        document.getElementById('sort-select').addEventListener('change', applyFilters);
        document.getElementById('category-select').addEventListener('change', applyFilters);

      } catch (error) {
        document.getElementById('browse-list').innerHTML = '<p style="text-align: center;">Failed to load tools.</p>';
      }
    }

    init();
  </script>
</body>

</html>
