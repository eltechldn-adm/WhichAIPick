<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search AI Tools — WhichAIPick</title>
    <meta name="description"
        content="Search AI tools by name or keyword. Find specific tools quickly across our entire directory of categorized AI solutions.">
    <meta name="robots" content="index,follow">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Search AI Tools — WhichAIPick">
    <meta property="og:description"
        content="Search AI tools by name or keyword. Find specific tools quickly across our entire directory of categorized AI solutions.">
    <meta property="og:image" content="/assets/logo/logo-final.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary">
    <meta property="twitter:title" content="Search AI Tools — WhichAIPick">
    <meta property="twitter:description"
        content="Search AI tools by name or keyword. Find specific tools quickly across our entire directory of categorized AI solutions.">

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico">

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">

    <link rel="stylesheet" href="/css/styles.css?v=2.6">
    <link rel="stylesheet" href="/css/pages/search.css">
</head>

<body data-bg="search">
    <div id="site-header"></div>

    <main>
        <div class="page-container">
            <div class="search-hero">
                <h1>Find the Right AI Tool</h1>
                <p>Search by name to find AI tools instantly.</p>

                <div class="search-input-container">
                    <input type="search" id="search-input" placeholder="Start typing to search..."
                        aria-label="Search for AI tools" autofocus>
                </div>

                <div id="search-stats" class="search-stats"></div>
            </div>

            <div id="search-results">
                <div id="search-empty-state" class="search-empty-state">
                    <p>Start typing to search…</p>
                </div>
                <div id="search-list" class="search-list"></div>
            </div>
        </div>
    </main>

    <div id="site-footer"></div>

    <script src="/js/main.js?v=6.4"></script>
    <script src="/js/layout.js?v=1.8" defer></script>
    <script>
        let allTools = [];
        let searchTimeout = null;

        // Extract domain from URL
        function getDomain(url) {
            if (!url) return 'N/A';
            try {
                const urlObj = new URL(url.startsWith('http') ? url : 'https://' + url);
                return urlObj.hostname.replace('www.', '');
            } catch {
                return 'N/A';
            }
        }

        // Render search results
        function renderResults(results, query) {
            const emptyState = document.getElementById('search-empty-state');
            const listContainer = document.getElementById('search-list');
            const statsContainer = document.getElementById('search-stats');

            // Empty query state
            if (!query || query.trim() === '') {
                emptyState.style.display = 'block';
                emptyState.innerHTML = '<p>Start typing to search…</p>';
                listContainer.innerHTML = '';
                statsContainer.textContent = '';
                return;
            }

            // No results state
            if (results.length === 0) {
                emptyState.style.display = 'block';
                emptyState.innerHTML = '<p>No matches found. Try a different keyword.</p>';
                listContainer.innerHTML = '';
                statsContainer.textContent = '';
                return;
            }

            // Hide empty state and show results
            emptyState.style.display = 'none';
            statsContainer.textContent = `Found ${results.length} tool${results.length === 1 ? '' : 's'}`;

            const fragment = document.createDocumentFragment();

            results.forEach(tool => {
                const card = document.createElement('div');
                card.className = 'tool-card';

                const domain = getDomain(tool.website_url);

                card.innerHTML = `
                    <div class="tool-card-header">
                        <h3><a href="/tool.html?id=${encodeURIComponent(tool.id)}">${tool.name}</a></h3>
                        <span class="tool-card-domain">${domain}</span>
                    </div>
                    <div class="tool-card-actions">
                        <a href="/tool.html?id=${encodeURIComponent(tool.id)}" class="btn btn-primary btn-sm">View Tool</a>
                        ${tool.website_url ? `<a href="${tool.website_url}" target="_blank" rel="noopener" class="btn-link-secondary">Website →</a>` : ''}
                    </div>
                `;

                fragment.appendChild(card);
            });

            listContainer.innerHTML = '';
            listContainer.appendChild(fragment);
        }

        // Perform search with debounce
        function performSearch() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();

            const results = allTools.filter(tool =>
                tool.name.toLowerCase().includes(query)
            );

            renderResults(results, query);
        }

        // Debounced search handler
        function handleSearchInput() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(performSearch, 250);
        }

        // Initialize
        async function init() {
            try {
                await loadTools();
                allTools = getAllTools();

                // Event listener with debounce
                document.getElementById('search-input').addEventListener('input', handleSearchInput);

                // Initial state
                renderResults([], '');

            } catch (error) {
                document.getElementById('search-empty-state').innerHTML =
                    '<p>Failed to load tools. Please refresh the page.</p>';
            }
        }

        init();
    </script>
</body>

</html>
