<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter — WhichAIPick</title>
    <meta name="description"
        content="Subscribe to the WhichAIPick newsletter for weekly AI tool discoveries and guides.">
    <meta name="robots" content="index,follow">
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="/css/styles.css?v=2.6">
</head>

<body data-bg="tool">
    <div id="site-header"></div>

    <main class="page-shell">
        <section class="hero-shell">
            <div class="hero-surface">
                <div class="hero-inner">
                    <h1>Join the AI Insider List</h1>
                    <div class="content-narrow">
                        <p>Get the best new AI tools, tutorials, and comparisons delivered to your inbox every week. No
                            spam, just value.</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="section-spaced">
            <div class="content-narrow" style="text-align: center; max-width: 500px; margin: 0 auto;">
                <div class="content-card">
                    <h2>Subscribe for Free</h2>
                    <p style="margin-bottom: 24px; color: var(--c-text-muted);">Join 5,000+ others discovering the
                        future of work.</p>

                    <!-- Placeholder Form -->
                    <form
                        onsubmit="event.preventDefault(); alert('Thanks for subscribing! (This is a demo)'); Analytics.track('newsletter_signup', { location: 'landing_page' });"
                        style="display: flex; flex-direction: column; gap: 12px;">
                        <input type="email" placeholder="Enter your email" required
                            style="padding: 12px; border-radius: 8px; border: 1px solid var(--c-border); background: var(--c-surface); color: var(--c-text);"
                            aria-label="Email address">
                        <button type="submit" class="btn btn-primary btn-lg">Subscribe Now</button>
                    </form>
                    <p style="font-size: 12px; color: var(--c-text-muted); margin-top: 16px;">Unsubscribe at any time.
                    </p>
                </div>
            </div>
        </section>
    </main>

    <div id="site-footer"></div>

    <script src="/js/main.js?v=6.4"></script>
    <script src="/js/layout.js?v=1.8" defer></script>
</body>

</html>
