<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Dashboard — Submissions</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">

    <style>
        .admin-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: var(--space-6);
            padding: var(--space-6) 0;
            min-height: 80vh;
        }

        .admin-sidebar {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--r-xl);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            max-height: 80vh;
        }

        .admin-sidebar-header {
            padding: var(--space-4);
            border-bottom: 1px solid var(--c-border);
        }

        .admin-search {
            width: 100%;
            padding: var(--space-2) var(--space-3);
            border: 1px solid var(--c-border);
            background: var(--c-bg);
            border-radius: var(--r-sm);
            color: var(--c-text);
            margin-bottom: var(--space-3);
        }

        .admin-filters {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .filter-btn {
            background: var(--c-bg);
            border: 1px solid var(--c-border);
            padding: 4px 10px;
            font-size: var(--text-xs);
            border-radius: var(--r-full);
            color: var(--c-text-muted);
            cursor: pointer;
            white-space: nowrap;
        }

        .filter-btn.active {
            background: var(--c-accent);
            color: #1a1a2e;
            /* dark text on orange */
            border-color: var(--c-accent);
        }

        .admin-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .admin-list-item {
            padding: var(--space-4);
            border-bottom: 1px solid var(--c-border);
            cursor: pointer;
            transition: background 0.2s;
        }

        .admin-list-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .admin-list-item.selected {
            background: rgba(245, 166, 35, 0.05);
            border-left: 3px solid var(--c-accent);
        }

        .item-title {
            font-weight: 600;
            color: var(--c-text);
            margin-bottom: 4px;
        }

        .item-meta {
            font-size: var(--text-xs);
            color: var(--c-text-muted);
            display: flex;
            justify-content: space-between;
        }

        .status-badge {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .status-new {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .status-Approved {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .status-Rejected {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .status-NeedsInfo {
            background: rgba(245, 166, 35, 0.2);
            color: var(--c-accent);
        }

        .admin-main {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--r-xl);
            padding: var(--space-6);
            overflow-y: auto;
            max-height: 80vh;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--c-text-muted);
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid var(--c-border);
            padding-bottom: var(--space-4);
            margin-bottom: var(--space-4);
        }

        .detail-title {
            font-size: var(--text-2xl);
            color: var(--c-text);
            margin-bottom: 8px;
        }

        .detail-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-action {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: var(--r-md);
            border: 1px solid var(--c-border);
            background: var(--c-surface);
            color: var(--c-text);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-action:hover {
            background: var(--c-bg);
        }

        .btn-action.approve:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
            color: #34d399;
        }

        .btn-action.reject:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            color: #f87171;
        }

        .btn-action.needs-info:hover {
            background: rgba(245, 166, 35, 0.2);
            border-color: var(--c-accent);
            color: var(--c-accent);
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-6);
        }

        .detail-section h4 {
            color: var(--c-text-muted);
            font-size: var(--text-sm);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--c-border);
            padding-bottom: 4px;
        }

        .detail-row {
            margin-bottom: 8px;
        }

        .detail-label {
            color: var(--c-text-muted);
            font-size: var(--text-sm);
        }

        .detail-value {
            color: var(--c-text);
            font-size: var(--text-sm);
            font-weight: 500;
        }

        .detail-value a {
            color: var(--c-accent);
        }

        .note-area {
            width: 100%;
            background: var(--c-bg);
            border: 1px solid var(--c-border);
            border-radius: var(--r-md);
            padding: var(--space-3);
            color: var(--c-text);
            font-family: inherit;
            min-height: 80px;
            margin-top: 8px;
        }

        /* Token Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .token-modal {
            background: var(--c-surface);
            padding: var(--space-8);
            border-radius: var(--r-xl);
            border: 1px solid var(--c-border);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .token-input {
            width: 100%;
            padding: var(--space-3);
            background: var(--c-bg);
            border: 1px solid var(--c-border);
            border-radius: var(--r-md);
            color: white;
            margin: var(--space-4) 0;
        }

        /* Top Bar */
        .admin-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-4);
        }

        /* Metrics Bar */
        .admin-metrics {
            display: flex;
            gap: 16px;
            margin-bottom: var(--space-4);
        }

        .metric-card {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--r-md);
            padding: 12px 16px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .metric-label {
            font-size: 12px;
            color: var(--c-text-muted);
            text-transform: uppercase;
        }

        .metric-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--c-text);
        }

        .metric-success {
            color: #34d399;
        }

        .metric-fail {
            color: #f87171;
        }

        @media (max-width: 980px) {
            .admin-layout {
                grid-template-columns: 1fr;
                display: flex;
                flex-direction: column;
            }

            .admin-sidebar {
                max-height: 40vh;
                min-height: 300px;
            }

            .admin-main {
                max-height: none;
                /* Let it expand naturally on mobile */
            }
        }
    </style>
</head>

<body class="page-static">
    <div id="site-header"></div>

    <main class="main-content">
        <div class="container container--wide pt-12">

            <div class="admin-topbar">
                <h1>Review Dashboard</h1>
                <button id="btnExport" class="btn btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        style="margin-right:8px; display:inline; vertical-align:-3px">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Export Approved Tools Patch
                </button>
            </div>

            <div class="admin-metrics" id="metricsContainer" style="display:none;">
                <div class="metric-card">
                    <span class="metric-label">Today's Submissions</span>
                    <span class="metric-value" id="metricTotal">0</span>
                </div>
                <div class="metric-card">
                    <span class="metric-label">Email Successes</span>
                    <span class="metric-value metric-success" id="metricEmailSuccess">0</span>
                </div>
                <div class="metric-card">
                    <span class="metric-label">Email Failures</span>
                    <span class="metric-value metric-fail" id="metricEmailFail">0</span>
                </div>
            </div>

            <div class="admin-layout">
                <!-- Sidebar -->
                <aside class="admin-sidebar">
                    <div class="admin-sidebar-header">
                        <input type="text" id="searchInput" class="admin-search" placeholder="Search tools...">
                        <div class="admin-filters">
                            <button class="filter-btn active" data-filter="all">All</button>
                            <button class="filter-btn" data-filter="new">New</button>
                            <button class="filter-btn" data-filter="Approved">Approved</button>
                            <button class="filter-btn" data-filter="Rejected">Rejected</button>
                        </div>
                    </div>
                    <ul class="admin-list" id="submissionList">
                        <!-- Items injected here -->
                    </ul>
                </aside>

                <!-- Main Panel -->
                <section class="admin-main" id="mainPanel">
                    <div class="empty-state">Select a submission from the left to view details.</div>
                </section>
            </div>
        </div>
    </main>

    <div id="site-footer"></div>

    <!-- Token Modal -->
    <div id="tokenModal" class="modal-overlay" style="display:none;">
        <div class="token-modal">
            <h2 style="margin-bottom:8px">Admin Access</h2>
            <p style="color:var(--c-text-muted); font-size:14px">Please enter your review token.</p>
            <input type="password" id="tokenInput" class="token-input" placeholder="ADMIN_REVIEW_TOKEN"
                onkeypress="if(event.key === 'Enter') checkToken()">
            <button onclick="checkToken()" class="btn btn-primary" style="width:100%">Authenticate</button>
            <p id="tokenError" style="color:#ef4444; font-size:12px; margin-top:12px; display:none;">Invalid token
                provided.</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/main.js?v=6.4"></script>
    <script src="/js/layout.js?v=1.8" defer></script>

    <script>
        let submissions = [];
        let currentFilter = 'all';
        let currentKey = null;

        document.addEventListener('DOMContentLoaded', () => {
            const token = sessionStorage.getItem('admin_token');
            if (!token) {
                document.getElementById('tokenModal').style.display = 'flex';
            } else {
                fetchSubmissions();
                fetchMetrics();
            }

            // Filters
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentFilter = e.target.dataset.filter;
                    renderList();
                });
            });

            // Search
            document.getElementById('searchInput').addEventListener('input', () => {
                renderList();
            });

            // Export
            document.getElementById('btnExport').addEventListener('click', exportApprovedPatch);
        });

        function checkToken() {
            const input = document.getElementById('tokenInput').value.trim();
            if (input) {
                sessionStorage.setItem('admin_token', input);
                document.getElementById('tokenModal').style.display = 'none';
                fetchSubmissions();
            }
        }

        async function apiFetch(url, options = {}) {
            const token = sessionStorage.getItem('admin_token');
            const headers = {
                'Authorization': `Bearer ${token}`,
                ...options.headers
            };
            const res = await fetch(url, { ...options, headers });

            if (res.status === 401) {
                sessionStorage.removeItem('admin_token');
                document.getElementById('tokenModal').style.display = 'flex';
                document.getElementById('tokenError').style.display = 'block';
                throw new Error("Unauthorized");
            }

            if (options.method === 'GET' && res.headers.get('content-type')?.includes('application/json') === false) {
                return res; // For blobs mostly
            }

            const data = await res.json();
            if (!res.ok) throw new Error(data.error || "API Error");
            return data;
        }

        async function fetchSubmissions() {
            try {
                const res = await apiFetch('/api/admin/submissions');
                submissions = res.data || [];
                renderList();
            } catch (e) {
                console.error(e);
            }
        }

        async function fetchMetrics() {
            try {
                const data = await apiFetch('/api/admin/metrics');
                document.getElementById('metricTotal').textContent = data.submissions;
                document.getElementById('metricEmailSuccess').textContent = data.email_success;
                document.getElementById('metricEmailFail').textContent = data.email_fail;
                document.getElementById('metricsContainer').style.display = 'flex';
            } catch (e) {
                console.error("Failed to load metrics", e);
            }
        }

        function renderList() {
            const listEl = document.getElementById('submissionList');
            listEl.innerHTML = '';

            const searchQ = document.getElementById('searchInput').value.toLowerCase();

            // Filter and Sort
            const filtered = submissions.filter(sub => {
                if (currentFilter !== 'all' && sub.status !== currentFilter) return false;
                if (searchQ) {
                    const matchName = sub.tool_name?.toLowerCase().includes(searchQ);
                    const matchUrl = sub.website_url?.toLowerCase().includes(searchQ);
                    const matchCat = sub.primary_category?.toLowerCase().includes(searchQ);
                    if (!matchName && !matchUrl && !matchCat) return false;
                }
                return true;
            }).sort((a, b) => new Date(b.created_at) - new Date(a.created_at)); // Descending sort

            filtered.forEach(sub => {
                const li = document.createElement('li');
                li.className = `admin-list-item ${currentKey === sub.key ? 'selected' : ''}`;
                li.onclick = () => loadDetail(sub.key);

                let sClass = sub.status === 'Needs Info' ? 'status-NeedsInfo' : `status-${sub.status}`;

                li.innerHTML = `
                    <div class="item-title">${escapeHTML(sub.tool_name)}</div>
                    <div class="item-meta">
                        <span>${new Date(sub.created_at).toLocaleDateString()}</span>
                        <span class="status-badge ${sClass}">${escapeHTML(sub.status)}</span>
                    </div>
                `;
                listEl.appendChild(li);
            });
        }

        async function loadDetail(key) {
            currentKey = key;
            renderList(); // Update selected state

            const panel = document.getElementById('mainPanel');
            panel.innerHTML = `<div class="empty-state">Loading...</div>`;

            try {
                const sub = await apiFetch(`/api/admin/submission?key=${encodeURIComponent(key)}`);

                panel.innerHTML = `
                    <div class="detail-header">
                        <div>
                            <div class="detail-title">${escapeHTML(sub.tool_name)}</div>
                            <a href="${escapeHTML(sub.website_url)}" target="_blank" style="color:var(--c-accent)">${escapeHTML(sub.website_url)} <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg></a>
                        </div>
                        <div class="detail-actions">
                            <button onclick="saveStatus('${key}', 'Approved')" class="btn-action approve">Approve</button>
                            <button onclick="saveStatus('${key}', 'Rejected')" class="btn-action reject">Reject</button>
                            <button onclick="saveStatus('${key}', 'Needs Info')" class="btn-action needs-info">Needs Info</button>
                            <button onclick="saveStatus('${key}', sub.status)" class="btn-action">Save Note</button>
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 24px">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <h4 style="color:var(--c-text-muted); font-size:12px; text-transform:uppercase; margin:0;">Reviewer Notes</h4>
                            <span style="font-size:12px; color:var(--c-text-muted);">Current Status: <strong class="status-badge status-${sub.status === 'Needs Info' ? 'NeedsInfo' : sub.status}">${sub.status}</strong></span>
                        </div>
                        <textarea id="reviewerNotes" class="note-area" placeholder="Internal notes...">${escapeHTML(sub.reviewer_notes || '')}</textarea>
                    </div>

                    <div class="detail-grid">
                        <div class="detail-section">
                            <h4>Basics</h4>
                            <div class="detail-row"><span class="detail-label">Type:</span> <span class="detail-value">${escapeHTML(sub.submission_type)}</span></div>
                            <div class="detail-row"><span class="detail-label">Tagline:</span> <span class="detail-value">${escapeHTML(sub.tagline)}</span></div>
                            <div class="detail-row"><span class="detail-label">Category:</span> <span class="detail-value">${escapeHTML(sub.primary_category)}</span></div>
                            <div class="detail-row"><span class="detail-label">Tags:</span> <span class="detail-value">${escapeHTML(sub.tags || 'None')}</span></div>
                            <div class="detail-row"><span class="detail-label">Date:</span> <span class="detail-value">${new Date(sub.created_at).toLocaleString()}</span></div>
                            <div class="detail-row"><span class="detail-label">IP:</span> <span class="detail-value">${escapeHTML(sub.ip)}</span></div>
                        </div>

                        <div class="detail-section">
                            <h4>Submitter</h4>
                            <div class="detail-row"><span class="detail-label">Email:</span> <span class="detail-value">${escapeHTML(sub.submitter_email)}</span></div>
                            <div class="detail-row"><span class="detail-label">Name:</span> <span class="detail-value">${escapeHTML(sub.submitter_name || 'N/A')}</span></div>
                            <div class="detail-row"><span class="detail-label">Relation:</span> <span class="detail-value">${escapeHTML(sub.relationship)}</span></div>
                        </div>

                        <div class="detail-section">
                            <h4>Product Matrix</h4>
                            <div class="detail-row"><span class="detail-label">Pricing:</span> <span class="detail-value">${escapeHTML(sub.pricing_model)} (Free Tier: ${sub.has_free_tier ? 'Yes' : 'No'})</span></div>
                            <div class="detail-row"><span class="detail-label">Platforms:</span> <span class="detail-value">${(sub.platforms || []).join(', ')}</span></div>
                            <div class="detail-row"><span class="detail-label">Target Users:</span> <span class="detail-value">${(sub.target_users || []).join(', ')}</span></div>
                            
                            <div style="margin-top:12px">
                                <span class="detail-label">Features:</span>
                                <ul style="margin:4px 0 0 16px; color:var(--c-text); font-size:14px">
                                    ${(sub.key_features || []).map(f => `<li>${escapeHTML(f)}</li>`).join('')}
                                </ul>
                            </div>
                            <div style="margin-top:12px">
                                <span class="detail-label">Use Cases:</span>
                                <ul style="margin:4px 0 0 16px; color:var(--c-text); font-size:14px">
                                    ${(sub.use_cases || []).map(f => `<li>${escapeHTML(f)}</li>`).join('')}
                                </ul>
                            </div>
                        </div>

                        <div class="detail-section">
                            <h4>Assets</h4>
                            <div class="detail-row"><span class="detail-label">Logo:</span> <span class="detail-value">${sub.logo_url ? `<a href="${escapeHTML(sub.logo_url)}" target="_blank">View</a>` : 'N/A'}</span></div>
                            <div class="detail-row"><span class="detail-label">Demo:</span> <span class="detail-value">${sub.demo_url ? `<a href="${escapeHTML(sub.demo_url)}" target="_blank">View</a>` : 'N/A'}</span></div>
                            <div class="detail-row"><span class="detail-label">Screenshots:</span> <span class="detail-value"><br>${escapeHTML(sub.screenshot_urls || 'N/A').replace(/\n/g, '<br>')}</span></div>
                        </div>
                    </div>

                    <div class="detail-section" style="margin-top: 24px">
                        <h4>Description</h4>
                        <div style="color:var(--c-text); font-size:14px; line-height:1.6">
                            ${escapeHTML(sub.description).replace(/\n/g, '<br>')}
                        </div>
                    </div>
                `;

            } catch (e) {
                panel.innerHTML = `<div class="empty-state" style="color:#ef4444">Error loading details: ${escapeHTML(e.message)}</div>`;
            }
        }

        async function saveStatus(key, statusTarget) {
            const notes = document.getElementById('reviewerNotes').value;

            try {
                await apiFetch('/api/admin/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key, status: statusTarget, reviewer_notes: notes })
                });

                // Update local summary
                const sum = submissions.find(s => s.key === key);
                if (sum) {
                    sum.status = statusTarget;
                    sum.reviewer_notes = notes;
                }

                // Refresh detail pane to show new status badge
                loadDetail(key);

            } catch (e) {
                alert('Error saving: ' + e.message);
            }
        }

        async function exportApprovedPatch() {
            try {
                const token = sessionStorage.getItem('admin_token');
                const res = await fetch('/api/admin/export-approved', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401) {
                    sessionStorage.removeItem('admin_token');
                    location.reload();
                    return;
                }

                if (!res.ok) throw new Error("Export failed");

                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `approved_tools_patch_${new Date().getTime()}.json`;
                document.body.appendChild(a);
                a.click();
                a.remove();

            } catch (e) {
                alert("Export error: " + e.message);
            }
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g,
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }
    </script>
</body>

</html>
